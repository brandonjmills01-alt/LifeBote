[build]
# Railway runs this to build the project before starting the server.
# 1. Install Python dependencies
# 2. Install Node dependencies and build the React app into frontend/dist
builder = "nixpacks"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "lifebote"
