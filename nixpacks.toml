# nixpacks.toml
# Railway uses Nixpacks to detect and build the project.
# This file tells it to install both Python and Node, build the frontend,
# then start the Python backend which serves the built frontend.

[phases.setup]
nixPkgs = ["python312", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "cd backend && pip install -r requirements.txt",
  "cd frontend && npm install",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
